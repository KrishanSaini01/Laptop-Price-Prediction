<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="logo">LaptopPredict</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/project">Prediction</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </div>
</nav>

<div class="container">

    <div class="card">

        <h1>Prediction History</h1>
        <br>

        <table style="width:100%; border-collapse:collapse;">

            <tr style="background:#38bdf8; color:white;">
                <th style="padding:12px;">Company</th>
                <th style="padding:12px;">RAM</th>
                <th style="padding:12px;">Weight</th>
                <th style="padding:12px;">Predicted Price</th>
            </tr>

            {% for row in historical_data %}

            <tr>
                <td style="padding:10px;">{{ row[0] }}</td>
                <td style="padding:10px;">{{ row[1] }}</td>
                <td style="padding:10px;">{{ row[2] }}</td>
                <td style="padding:10px;">₹ {{ row[3] }}</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</div>

<footer>
    <h3>Laptop Price Prediction System</h3>
    <p>Powered by Flask & Machine Learning</p>
</footer>

</body>
</html>
